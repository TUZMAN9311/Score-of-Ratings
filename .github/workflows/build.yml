name: Build Android APK

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install .NET 10 SDK via apt
      run: |
        sudo apt-get update
        sudo apt-get install -y dotnet-sdk-10.0

    - name: Run build script
      run: |
        chmod +x ./build.sh
        ./build.sh

    # Шаг 1: Сохраняем APK в Артефакты сборки (чтобы на странице Actions появился блок скачивания)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScoreOfRatings-APK
        path: bin/Release/net10.0-android/*-Signed.apk

    # Шаг 2: Если билд запущен публикацией релиза на GitHub, прикрепляем APK прямо в Assets релиза
    - name: Upload APK to Release Assets
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'release'
      with:
        files: bin/Release/net10.0-android/*-Signed.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
